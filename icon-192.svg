<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg192" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0"/>
      <stop offset="100%" style="stop-color:#0D47A1"/>
    </linearGradient>
    <linearGradient id="drum192" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#E3F2FD;stop-opacity:0.9"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="192" height="192" rx="42" fill="url(#bg192)"/>

  <!-- Mesin cuci — bodi -->
  <rect x="38" y="50" width="116" height="108" rx="14" fill="url(#drum192)"/>

  <!-- Panel atas -->
  <rect x="38" y="50" width="116" height="28" rx="14" fill="rgba(255,255,255,0.15)"/>
  <rect x="38" y="64" width="116" height="14" fill="rgba(255,255,255,0.15)"/>

  <!-- Tombol kecil panel -->
  <circle cx="62" cy="63" r="6" fill="#42A5F5"/>
  <circle cx="82" cy="63" r="6" fill="#29B6F6"/>
  <rect x="110" y="57" width="32" height="12" rx="6" fill="#1565C0" opacity="0.4"/>

  <!-- Drum (lingkaran utama) -->
  <circle cx="96" cy="116" r="38" fill="#1565C0" opacity="0.12"/>
  <circle cx="96" cy="116" r="38" fill="none" stroke="#1565C0" stroke-width="3" opacity="0.4"/>

  <!-- Kaca drum (cincin luar) -->
  <circle cx="96" cy="116" r="34" fill="none" stroke="#1565C0" stroke-width="2.5" opacity="0.25"/>

  <!-- Efek air dalam drum -->
  <ellipse cx="96" cy="122" rx="22" ry="10" fill="#1976D2" opacity="0.18"/>

  <!-- Simbol pakaian / gelombang air -->
  <path d="M78 112 Q88 105 96 112 Q104 119 114 112" fill="none" stroke="#1565C0" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <path d="M78 120 Q88 113 96 120 Q104 127 114 120" fill="none" stroke="#1565C0" stroke-width="3" stroke-linecap="round" opacity="0.5"/>

  <!-- Highlight drum -->
  <circle cx="80" cy="100" r="5" fill="white" opacity="0.35"/>

  <!-- Kaki mesin -->
  <rect x="56" y="155" width="14" height="10" rx="4" fill="#1565C0" opacity="0.4"/>
  <rect x="122" y="155" width="14" height="10" rx="4" fill="#1565C0" opacity="0.4"/>
</svg>
