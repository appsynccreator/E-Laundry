<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0"/>
      <stop offset="100%" style="stop-color:#0A3880"/>
    </linearGradient>
    <linearGradient id="drum512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.96"/>
      <stop offset="100%" style="stop-color:#DDEEFF;stop-opacity:0.92"/>
    </linearGradient>
    <radialGradient id="glow512" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#42A5F5;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#1565C0;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background penuh (maskable — safe zone 512 × 80% = ~409px, centered) -->
  <rect width="512" height="512" fill="url(#bg512)"/>

  <!-- Subtle radial glow center -->
  <circle cx="256" cy="256" r="240" fill="url(#glow512)"/>

  <!-- Dekorasi sudut -->
  <circle cx="0" cy="0" r="80" fill="rgba(255,255,255,0.04)"/>
  <circle cx="512" cy="512" r="100" fill="rgba(255,255,255,0.04)"/>

  <!-- Mesin cuci — bodi -->
  <rect x="96" y="128" width="320" height="296" rx="38" fill="url(#drum512)"/>

  <!-- Panel atas mesin -->
  <rect x="96" y="128" width="320" height="74" rx="38" fill="rgba(255,255,255,0.18)"/>
  <rect x="96" y="168" width="320" height="34" fill="rgba(255,255,255,0.18)"/>

  <!-- Tombol panel kiri -->
  <circle cx="156" cy="164" r="16" fill="#42A5F5"/>
  <circle cx="156" cy="164" r="9" fill="#1565C0" opacity="0.5"/>
  <circle cx="204" cy="164" r="16" fill="#26C6DA"/>
  <circle cx="204" cy="164" r="9" fill="#0097A7" opacity="0.5"/>

  <!-- Layar digital panel kanan -->
  <rect x="284" y="148" width="112" height="32" rx="10" fill="#0D47A1" opacity="0.5"/>
  <rect x="292" y="155" width="36" height="5" rx="2.5" fill="#42A5F5" opacity="0.8"/>
  <rect x="292" y="165" width="24" height="5" rx="2.5" fill="#42A5F5" opacity="0.5"/>

  <!-- Drum (lingkaran besar) -->
  <!-- Lingkaran luar chrome -->
  <circle cx="256" cy="310" r="108" fill="#1565C0" opacity="0.1"/>
  <circle cx="256" cy="310" r="108" fill="none" stroke="#1565C0" stroke-width="7" opacity="0.35"/>

  <!-- Ring tengah -->
  <circle cx="256" cy="310" r="94" fill="none" stroke="#1565C0" stroke-width="4" opacity="0.2"/>

  <!-- Area kaca drum -->
  <circle cx="256" cy="310" r="88" fill="#1565C0" opacity="0.07"/>

  <!-- Efek air -->
  <ellipse cx="256" cy="328" rx="62" ry="24" fill="#1976D2" opacity="0.16"/>

  <!-- Gelombang air 1 -->
  <path d="M192 298 Q224 280 256 298 Q288 316 320 298"
        fill="none" stroke="#1565C0" stroke-width="7"
        stroke-linecap="round" opacity="0.65"/>

  <!-- Gelombang air 2 -->
  <path d="M192 320 Q224 302 256 320 Q288 338 320 320"
        fill="none" stroke="#1565C0" stroke-width="7"
        stroke-linecap="round" opacity="0.45"/>

  <!-- Busa / gelembung -->
  <circle cx="224" cy="278" r="9" fill="#42A5F5" opacity="0.3"/>
  <circle cx="248" cy="268" r="6" fill="#42A5F5" opacity="0.22"/>
  <circle cx="288" cy="275" r="8" fill="#42A5F5" opacity="0.26"/>

  <!-- Highlight drum (kiri atas) -->
  <ellipse cx="210" cy="272" rx="18" ry="12" fill="white" opacity="0.28" transform="rotate(-30 210 272)"/>

  <!-- Sekrup/baut sudut drum -->
  <circle cx="168" cy="222" r="8" fill="#1565C0" opacity="0.22"/>
  <circle cx="344" cy="222" r="8" fill="#1565C0" opacity="0.22"/>
  <circle cx="168" cy="398" r="8" fill="#1565C0" opacity="0.22"/>
  <circle cx="344" cy="398" r="8" fill="#1565C0" opacity="0.22"/>

  <!-- Kaki mesin -->
  <rect x="142" y="418" width="44" height="26" rx="10" fill="#1565C0" opacity="0.38"/>
  <rect x="326" y="418" width="44" height="26" rx="10" fill="#1565C0" opacity="0.38"/>

  <!-- Teks "E-Laundry" kecil di bawah panel -->
  <!-- (Dihilangkan karena terlalu kecil di ukuran 192; icon biarkan visual saja) -->
</svg>
