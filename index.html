// ── GAS URL SETUP ──
function saveGasUrl(){

}
function updGas(){
  var u=document.getElementById('gas-url-dp').value.trim();

}
function testGas(){

}

// ── GAS CALLER (fetch-based, no google.script.run) ──
function gasCall(action,params){
  if(!GAS_URL)return Promise.reject(new Error('GAS URL belum dikonfigurasi'));
  // GAS doGet menerima ?action=X&params=JSON
  var url=GAS_URL
    +'?action='+encodeURIComponent(action)
    +'&params='+encodeURIComponent(JSON.stringify(params||{}))
    +'&t='+Date.now();
  return fetch(url,{method:'GET',redirect:'follow'})
    .then(function(r){
      if(!r.ok)throw new Error('HTTP '+r.status);
      // GAS output text/html, kita parse sebagai JSON
      return r.text();
    })
    .then(function(txt){
      // Cari JSON di dalam response GAS (mungkin ada wrapper HTML)
      var m=txt.match(/\{[\s\S]*\}/);
      if(!m)throw new Error('Response bukan JSON: '+txt.substring(0,100));
      var d=JSON.parse(m[0]);
      if(d&&d.__error)throw new Error(d.__error);
      return d;
    });
}

// ── BOOT APP ──
function bootApp(){
  showLoad(true);
  Promise.all([
    gasCall('getLicenseStatus',{}),
    gasCall('getCurrentUser',{}),
    gasCall('getConfigAsObject',{}),
  ]).then(function(res){
    showLoad(false);
    appLic  = res[0]||{status:'ACTIVE',paket:'Professional',daysLeft:365,tglExpired:'-'};
    curUser = res[1]||{nama:'Owner',role:'Owner',menuAkses:null};
    appCfg  = res[2]||{};
    localStorage.setItem('el_lic', JSON.stringify(appLic));
    localStorage.setItem('el_usr', JSON.stringify(curUser));
    localStorage.setItem('el_cfg', JSON.stringify(appCfg));
    if(appLic.status==='LOCKED'){
      document.getElementById('act-sc').style.display='block';
      return;
    }
    initUI();
  }).catch(function(err){
    showLoad(false);
    console.warn('[boot] GAS failed, using cache:',err);
    var cl=safeJ(localStorage.getItem('el_lic'));
    var cu=safeJ(localStorage.getItem('el_usr'));
    var cc=safeJ(localStorage.getItem('el_cfg'));
    if(cl||cu){
      toast('Mode offline \u2014 data dari cache lokal','warning');
      appLic=cl||{status:'ACTIVE',paket:'Professional',daysLeft:365};
      curUser=cu||{nama:'Owner',role:'Owner',menuAkses:null};
      appCfg=cc||{};
      initUI();
    } else {
      toast('Tidak dapat terhubung ke server. Periksa URL GAS.','danger');
      document.getElementById('setup-sc').style.display='block';
    }
  });
}

}

// ── USER MANAGEMENT ──
var AMK=['dashboard','transaksi-baru','daftar-transaksi','pelanggan','layanan','karyawan','pengeluaran','laporan','pengaturan'];
var RPRST={'Owner':AMK,'Admin':['dashboard','transaksi-baru','daftar-transaksi','pelanggan','layanan','karyawan','pengeluaran','laporan'],'Kasir':['dashboard','transaksi-baru','daftar-transaksi','pelanggan']};
function setMC(arr){arr=arr||[];AMK.forEach(function(k){var e=document.getElementById('mc-'+k);if(e)e.checked=arr.indexOf(k)!==-1;});}
function getMC(){return AMK.filter(function(k){var e=document.getElementById('mc-'+k);return e&&e.checked;});}
function setAM(v){AMK.forEach(function(k){var e=document.getElementById('mc-'+k);if(e)e.checked=v;});}
function apPr(){setMC(RPRST[gv('usr-ro')]||AMK);}
function loadUsr(){
  gasCall('getUsers',{}).then(function(data){
    _uC={};(data||[]).forEach(function(u){_uC[u.email]=u;});
    var tb=document.getElementById('tb-usr');
    var rb={'Owner':'bow','Admin':'bad','Kasir':'bks'};
    if(!data||!data.length){tb.innerHTML='<tr><td colspan="6" style="text-align:center;padding:18px;color:var(--tx3)">Belum ada user</td></tr>';return;}
    tb.innerHTML=data.map(function(u){var mc=(u.menuAkses||[]).length;return '<tr><td><strong>'+(u.nama||'-')+'</strong></td><td style="font-size:12px;color:var(--tx3)">'+(u.email||'-')+'</td><td><span class="badge '+(rb[u.role]||'')+'">'+( u.role||'-')+'</span></td><td><span class="badge '+(u.status==='Aktif'?'bak':'bna')+'">'+(u.status||'-')+'</span></td><td style="font-size:12px;color:var(--tx3)">&#128272; '+mc+' menu</td><td style="white-space:nowrap"><button class="bi" onclick="editUsr(\''+esc(u.email)+'\')" title="Edit">&#x270F;&#xFE0F;</button><button class="bi de" onclick="hapUsr(\''+esc(u.email)+'\')" title="Hapus">&#x1F5D1;</button></td></tr>';}).join('');
  }).catch(function(){toast('Gagal load users','danger');});
}
function openUser(){sv('usr-oe','');sv('usr-nm','');sv('usr-em','');sv('usr-ct','');document.getElementById('usr-ro').value='Kasir';document.getElementById('usr-st').value='Aktif';tx('m-usr-t','Tambah User');setMC(RPRST['Kasir']);openM('m-usr');}
function editUsr(email){var u=_uC[email];if(!u){toast('Data user tidak ditemukan','warning');return;}sv('usr-oe',u.email||'');sv('usr-nm',u.nama||'');sv('usr-em',u.email||'');sv('usr-ct',u.catatan||'');document.getElementById('usr-ro').value=u.role||'Kasir';document.getElementById('usr-st').value=u.status||'Aktif';tx('m-usr-t','Edit User - '+(u.nama||''));setMC(u.menuAkses||RPRST[u.role]||AMK);openM('m-usr');}
function savUsr(){
  var oe=gv('usr-oe'),nm=gv('usr-nm'),em=gv('usr-em');
  if(!nm){toast('Nama wajib diisi','warning');return;}
  if(!em){toast('Email wajib diisi','warning');return;}
  var ma=getMC();if(!ma.length){toast('Pilih minimal 1 menu akses','warning');return;}
  var data={nama:nm,email:em,role:gv('usr-ro'),status:gv('usr-st'),catatan:gv('usr-ct'),menuAkses:ma};
  showLoad(true);
  var fn=oe?gasCall('editUser',{email:oe,data:data}):gasCall('tambahUser',{data:data});
  fn.then(function(r){showLoad(false);if(r&&r.success===false){toast(r.message||'Gagal','danger');return;}toast('User berhasil disimpan','success');closeM('m-usr');loadUsr();}).catch(function(e){showLoad(false);toast('Error: '+(e.message||e),'danger');});
}
function hapUsr(email){if(!cfm('Hapus user '+email+'?'))return;showLoad(true);gasCall('hapusUser',{email:email}).then(function(){showLoad(false);toast('User dihapus','success');loadUsr();}).catch(function(e){showLoad(false);toast('Error: '+(e.message||e),'danger');});}

// ── LISENSI ──
function doActivate(){var k=document.getElementById('lic-in').value.trim();if(!k){toast('Masukkan kode lisensi','warning');return;}showLoad(true);gasCall('activateLicense',{licenseKey:k}).then(function(r){showLoad(false);if(r.success){toast('Lisensi aktif! Memuat...','success');setTimeout(function(){location.reload();},1500);}else{toast(r.message||'Kode tidak valid','danger');}}).catch(function(){showLoad(false);toast('Gagal aktivasi','danger');});}
function updLic(){var k=document.getElementById('lic-nw').value.trim();if(!k){toast('Masukkan kode baru','warning');return;}document.getElementById('lic-in').value=k;doActivate();}

// ── PAGINATION ──
function rndrPg(cId,total,cur,sz,onPage){
  var pages=Math.ceil(total/sz),c=document.getElementById(cId);
  if(pages<=1){c.innerHTML='';return;}
  var h='<span class="pgi">'+((cur-1)*sz+1)+'-'+Math.min(cur*sz,total)+' dari '+total+'</span>';
  h+='<button class="pgb" '+(cur===1?'disabled':'')+' onclick="('+onPage.toString()+')'+(cur-1)+'">&#x2039;</button>';
  var s=Math.max(1,cur-2),e=Math.min(pages,s+4);
  for(var p=s;p<=e;p++){h+='<button class="pgb '+(p===cur?'active':'')+'" onclick="('+onPage.toString()+')'+p+'">'+p+'</button>';}
  h+='<button class="pgb" '+(cur===pages?'disabled':'')+' onclick="('+onPage.toString()+')'+(cur+1)+'">&#x203A;</button>';
  c.innerHTML=h;
}
</script>
