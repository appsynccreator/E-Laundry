<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<meta name="theme-color" content="#0D47A1">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="E-Laundry">
<meta name="description" content="E-Laundry Management System — Kelola laundry Anda dengan mudah">

<title>E-Laundry Management System</title>

<!-- PWA Manifest -->
<link rel="manifest" href="manifest.json">

<!-- Icons -->
<link rel="icon" type="image/svg+xml" href="icon-192.svg">
<link rel="apple-touch-icon" href="icon-192.svg">

<!-- Preconnect untuk performa -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  /* ── SPLASH SCREEN ── */
  :root {
    --primary: #1565C0;
    --primary-dark: #0D47A1;
    --primary-light: #42A5F5;
    --bg: #F0F4F8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #1E293B;
  }

  #splash {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    text-align: center;
    background: linear-gradient(135deg, var(--primary-dark), var(--primary));
  }

  .splash-icon {
    font-size: 72px;
    margin-bottom: 20px;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  .splash-title {
    font-size: 26px;
    font-weight: 800;
    color: #fff;
    margin-bottom: 6px;
    letter-spacing: -0.3px;
  }

  .splash-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.65);
    margin-bottom: 40px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .splash-spinner {
    width: 40px;
    height: 40px;
    border: 3px solid rgba(255,255,255,0.25);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
    margin-bottom: 14px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .splash-status {
    font-size: 13px;
    color: rgba(255,255,255,0.75);
    font-weight: 500;
  }

  /* Error state */
  #error-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 32px 20px;
    text-align: center;
    background: var(--bg);
  }

  .err-icon { font-size: 56px; margin-bottom: 16px; }

  .err-title {
    font-size: 20px;
    font-weight: 700;
    color: #C62828;
    margin-bottom: 8px;
  }

  .err-msg {
    font-size: 13px;
    color: #475569;
    max-width: 340px;
    line-height: 1.6;
    margin-bottom: 24px;
  }

  .err-btn {
    display: inline-block;
    padding: 12px 28px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    text-decoration: none;
  }

  /* Iframe container (hidden saat splash) */
  #app-frame {
    display: none;
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
  }
</style>
</head>
<body>

<!-- ── SPLASH SCREEN ── -->
<div id="splash">
  <div class="splash-icon">🧺</div>
  <div class="splash-title">E-Laundry</div>
  <div class="splash-sub">Management System</div>
  <div class="splash-spinner"></div>
  <div class="splash-status" id="splash-status">Menghubungkan ke server...</div>
</div>

<!-- ── ERROR SCREEN ── -->
<div id="error-screen">
  <div class="err-icon">⚠️</div>
  <div class="err-title">Gagal Memuat Aplikasi</div>
  <div class="err-msg" id="err-msg">
    Tidak dapat terhubung ke server. Pastikan koneksi internet Anda aktif dan coba lagi.
  </div>
  <button class="err-btn" onclick="retryLoad()">🔄 Coba Lagi</button>
</div>

<!-- ── APP FRAME (konten penuh dari GAS) ── -->
<iframe id="app-frame" title="E-Laundry Management System" allow="clipboard-write"></iframe>

<script>
  // ──────────────────────────────────────────────
  // KONFIGURASI — ganti GAS_URL dengan URL deploy GAS
  // ──────────────────────────────────────────────
  var GAS_URL = 'GANTI_DENGAN_URL_DEPLOYMENT_GAS';
  // Contoh: 'https://script.google.com/macros/s/AKfycb.../exec'

  var LOAD_TIMEOUT_MS = 20000; // 20 detik
  var _timer = null;
  var _loaded = false;

  function showSplash(msg) {
    document.getElementById('splash-status').textContent = msg || 'Memuat...';
    document.getElementById('splash').style.display = 'flex';
    document.getElementById('error-screen').style.display = 'none';
    document.getElementById('app-frame').style.display = 'none';
  }

  function showApp() {
    if (_timer) clearTimeout(_timer);
    _loaded = true;
    document.getElementById('splash').style.display = 'none';
    document.getElementById('error-screen').style.display = 'none';
    document.getElementById('app-frame').style.display = 'block';
  }

  function showError(msg) {
    if (_timer) clearTimeout(_timer);
    document.getElementById('splash').style.display = 'none';
    document.getElementById('app-frame').style.display = 'none';
    if (msg) document.getElementById('err-msg').textContent = msg;
    document.getElementById('error-screen').style.display = 'flex';
  }

  function retryLoad() {
    _loaded = false;
    showSplash('Menghubungkan ulang...');
    loadApp();
  }

  function loadApp() {
    if (!GAS_URL || GAS_URL === 'GANTI_DENGAN_URL_DEPLOYMENT_GAS') {
      showError('URL server belum dikonfigurasi. Hubungi administrator sistem.');
      return;
    }

    var frame = document.getElementById('app-frame');
    frame.src = '';

    // Timeout jika GAS tidak merespons
    _timer = setTimeout(function() {
      if (!_loaded) {
        showError('Server tidak merespons dalam batas waktu. Pastikan koneksi Anda aktif dan coba lagi.');
      }
    }, LOAD_TIMEOUT_MS);

    showSplash('Memuat aplikasi...');

    frame.onload = function() {
      // Beri sedikit delay agar konten GAS ter-render
      setTimeout(showApp, 300);
    };

    frame.onerror = function() {
      showError('Gagal memuat aplikasi. Periksa koneksi internet Anda.');
    };

    frame.src = GAS_URL;
  }

  // Daftarkan Service Worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('sw.js')
        .then(function(reg) {
          console.log('[SW] Terdaftar, scope:', reg.scope);
        })
        .catch(function(err) {
          console.warn('[SW] Gagal daftar:', err);
        });
    });
  }

  // Mulai load
  document.addEventListener('DOMContentLoaded', loadApp);
</script>

</body>
</html>
